# Tool versions: fuzzy spec here, exact version + checksums in mise.lock
# (regenerate with `mise lock` after bumping).

# Oldest mise this workflow supports: lockfiles read by default since 2026.2.0
# (jdx/mise#7929), `mise lock` stable since 2026.2.5 (jdx/mise#8011).
min_version = "2026.2.5"

[tools]
bun = "1.3"

# Deliberately no NODE_ENV here: mise [env] applies to every command run in
# this directory (and reaches every later CI step via mise-action's
# `mise env` → GITHUB_ENV export) — a global NODE_ENV=development leaks into
# `vite build` and ships dev-mode React. Tools set their own.
[env]
_.path = "node_modules/.bin"

# Task split: mise owns bootstrap (setup), dev-loop forwarding (dev, dev:cef,
# lint, typecheck) and env/dir packaging combos (pack*, feed:serve). build and
# release stay bun scripts in package.json — CI locks their toolchain via
# mise-action + mise.lock, so a mise wrapper would add nothing.

# --- Setup & dev workflow ---------------------------------------------------

[tasks.setup]
description = "One-shot bootstrap for a fresh clone: install tools + JS deps"
# `mise install` provisions the locked toolchain (bun via mise.lock); the bun
# install then pulls JS deps and runs husky's `prepare` hook.
run = ["mise install", "bun install"]

[tasks.dev]
description = "Run the desktop app (Vite HMR on :5173; restart to pick up bun-process changes)"
run = "bun run dev"

[tasks."dev:cef"]
description = "Run the desktop app with CEF/CDP debugging on :9333"
run = "bun run dev:cef"

[tasks.lint]
description = "Check lint (read-only)"
run = "bun run lint"

[tasks.typecheck]
description = "Typecheck all packages (tsc --noEmit, root + desktop tsconfigs)"
run = "bun run typecheck"

# --- Local packaging (see AGENTS.md "Releases & auto-update") ---------------

[tasks.pack]
description = "Unsigned canary build — fastest local packaging check"
dir = "apps/desktop"
env = { LLM_SPACE_SKIP_SIGNING = "1" }
run = "bun run build:canary"

[tasks."pack:adhoc"]
description = "Ad-hoc signed canary build — exercises the signing path with no Apple creds"
dir = "apps/desktop"
env = { LLM_SPACE_SKIP_NOTARIZE = "1", ELECTROBUN_DEVELOPER_ID = "-" }
run = "bun run build:canary"

[tasks."pack:signed"]
description = "Developer-ID signed canary build, no notarization (set ELECTROBUN_DEVELOPER_ID yourself)"
dir = "apps/desktop"
env = { LLM_SPACE_SKIP_NOTARIZE = "1" }
run = "bun run build:canary"

# --- Local auto-update loop: `feed:serve` in one terminal, then `pack:feed`
# --- once per version; launch the app from a copy outside build/ ------------

[tasks."pack:feed"]
description = "Unsigned canary build published to the local update feed (localhost:8321)"
dir = "apps/desktop"
env = { LLM_SPACE_SKIP_SIGNING = "1", LLM_SPACE_UPDATE_BASE_URL = "http://localhost:8321" }
run = ["bun run build:canary", "mkdir -p .dev-feed && cp artifacts/* .dev-feed/"]

[tasks."feed:serve"]
description = "Serve the local update feed on localhost:8321"
dir = "apps/desktop"
run = "bun scripts/serve-feed.ts"
